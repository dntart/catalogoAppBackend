services:
  postgres:
    image: postgres:16-alpine
    container_name: fauna_de_tela_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fauna_de_tela
    ports:
      - '5432:5432'
    volumes:
      - fauna_de_tela_pgdata:/var/lib/postgresql/data

volumes:
  fauna_de_tela_pgdata:
